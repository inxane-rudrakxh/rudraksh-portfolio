[build]
  publish = "."
  command  = ""

# ─── Redirect bare directory paths to extensionless index pages ───────────────

[[redirects]]
  from   = "/"
  to     = "/index"
  status = 200
  force  = false

[[redirects]]
  from   = "/blog"
  to     = "/blog/index"
  status = 200
  force  = false

[[redirects]]
  from   = "/blog/"
  to     = "/blog/index"
  status = 200
  force  = false

[[redirects]]
  from   = "/work"
  to     = "/work/index"
  status = 200
  force  = false

[[redirects]]
  from   = "/work/"
  to     = "/work/index"
  status = 200
  force  = false

# ─── Security & content-type headers ─────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# Root HTML page
[[headers]]
  for = "/index"
  [headers.values]
    Content-Type  = "text/html; charset=UTF-8"
    Cache-Control = "public, max-age=0, must-revalidate"

# Blog pages (index + all articles)
[[headers]]
  for = "/blog/*"
  [headers.values]
    Content-Type  = "text/html; charset=UTF-8"
    Cache-Control = "public, max-age=0, must-revalidate"

# Work pages (index + all case studies)
[[headers]]
  for = "/work/*"
  [headers.values]
    Content-Type  = "text/html; charset=UTF-8"
    Cache-Control = "public, max-age=0, must-revalidate"

# ─── Immutable asset caching ──────────────────────────────────────────────────

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*.woff2"
  [headers.values]
    Cache-Control              = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/images/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
